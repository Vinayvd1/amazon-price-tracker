name: Amazon Price Tracker

on:
  schedule:
    # Runs every 6 hours  (change to your liking)
    # cron format: minute hour day month weekday
    - cron: "0 */6 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes Node.js deprecation warning

jobs:
  track-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit price_history.csv back to repo

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # fixes exit code 128 push error
          fetch-depth: 0

      # ── 2. Set up Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the tracker ──────────────────────────────────────────
      - name: Run price tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      # ── 5. Commit updated price history back to repo ─────────────────
      - name: Commit price history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          git add data/price_history.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📈 Price update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push origin HEAD
